server {
    listen 80;
    server_name kebab.games www.kebab.games;

    root /usr/share/nginx/html;
    index index.html;

    # Blazor WebAssembly MIME types
    include /etc/nginx/mime.types;

    types {
        application/wasm wasm;
        application/octet-stream dll;
        application/json json;
        application/javascript js;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/wasm application/octet-stream;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(css|js|wasm|dll|dat|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Blazor framework files
    location /_framework/ {
        gzip_static on;
    }
}
