name: Deploy HG.Games

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish HG.Games.csproj -c Release -o "${{ github.workspace }}/publish"

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Ensure deploy directory
        run: |
          ssh -p "${{ secrets.SSH_PORT }}" -o StrictHostKeyChecking=no \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "mkdir -p /var/www/apps/hg.games"

      - name: Upload published files
        run: |
          rsync -avz --delete \
            -e "ssh -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no" \
            "${{ github.workspace }}/publish/wwwroot/" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/apps/hg.games/"
