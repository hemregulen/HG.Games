<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kebab.games - Eğlenceli Oyunlar</title>
    <base href="./" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="HG.Games.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body data-file-warning="This app cannot run from the file system. Serve it via a static server. / Bu uygulama dosya sisteminden çalışmaz. Statik sunucuyla açın.">
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script>
        const fileMessage = document.body.dataset.fileWarning;
        const showFileMessage = () => {
            document.documentElement.style.setProperty("--blazor-load-percentage-text", JSON.stringify(fileMessage));

            const progress = document.querySelector(".loading-progress");
            if (progress) {
                progress.style.display = "none";
            }
        };

        if (location.protocol === "file:") {
            showFileMessage();
        } else {
            window.addEventListener(
                "error",
                (event) => {
                    const target = event.target;
                    if (
                        target &&
                        target.tagName === "SCRIPT" &&
                        (target.hasAttribute("data-blazor-webassembly-script") ||
                            target.getAttribute("src")?.includes("_framework/blazor.webassembly"))
                    ) {
                        showFileMessage();
                    }
                },
                true
            );
        }
    </script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js" data-blazor-webassembly-script="true"></script>
</body>

</html>
